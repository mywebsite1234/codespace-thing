version: '3.8'

services:
  code-server:
    image: codercom/code-server:latest
    container_name: my-cloud-ide
    ports:
      - "8080:8080"
    environment:
      - PASSWORD=Get_out!
    volumes:
      - code-server-data:/home/coder/workspace
    command: --bind-addr 0.0.0.0:8080 --auth password
    restart: always

volumes:
  code-server-data:
